services:
  web:
    build: .
    ports:
      - "3000:3000"
    environment:
      - ROLE=web
      - DATABASE_URL=file:/app/data/dev.db
    volumes:
      - pr_aggregator_data:/app/data
      - pr_aggregator_logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "try { require('fs').accessSync('/app/data/dev.db'); process.exit(0); } catch(e) { process.exit(1); }"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      worker:
        condition: service_started

  worker:
    build: .
    environment:
      - ROLE=worker
      - DATABASE_URL=file:/app/data/dev.db
    volumes:
      - pr_aggregator_data:/app/data
      - pr_aggregator_logs:/app/logs
    restart: unless-stopped

volumes:
  pr_aggregator_data:
  pr_aggregator_logs:
